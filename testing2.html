    <style>
      /* font-faces */
      :root {
        --color: FF8600;
      }
      @font-face {
        font-family: goozette;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/goozette/Goozette.otf")
          format("opentype");
        font-display: swap;
      }

      /* Avara */
      @font-face {
        font-family: avara;
        src:
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/avara/Avara-Black.woff2")
            format("woff2"),
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/avara/Avara-Black.woff")
            format("woff");
        font-weight: 900;
        font-display: swap;
      }

      @font-face {
        font-family: avara;
        src:
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/avara/Avara-Bold.woff2")
            format("woff2"),
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/avara/Avara-Bold.woff")
            format("woff");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: avara;
        src:
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/avara/Avara-BoldItalic.woff2")
            format("woff2"),
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/avara/Avara-BoldItalic.woff")
            format("woff");
        font-weight: 700;
        font-style: italic;
        font-display: swap;
      }

      /* =====================
   orbit-fonts — all @font-face
   ===================== */

      /* ---- XX Fonts ---- */
      @font-face {
        font-family: xx1;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxAmour-fort.ttf")
          format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: xx2;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxDopamine-Mono.ttf")
          format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: xx3;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxLiberte-Grotesque.ttf")
          format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: xx4;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxQueen-basic.ttf")
          format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: xx5;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxQueen-juicy.ttf")
          format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: xx6;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxStardust-super.ttf")
          format("truetype");
        font-display: swap;
      }

      @font-face {
        font-family: xx7;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/xx/xxTreasure-radical.ttf")
          format("truetype");
        font-display: swap;
      }

      /* ---- Terminal Grotesque ---- */
      @font-face {
        font-family: terminal;
        src:
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/terminal/terminal-grotesque-webfont.woff2")
            format("woff2"),
          url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/terminal/terminal-grotesque-webfont.woff")
            format("woff");
        font-display: swap;
      }

      /* ---- Redaction ---- */
      @font-face {
        font-family: redaction;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/redaction/Redaction-Regular.woff2")
          format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: redaction;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/redaction/Redaction-Italic.woff2")
          format("woff2");
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }

      @font-face {
        font-family: redaction;
        src: url("https://cdn.jsdelivr.net/gh/rararaforever/orbit-fonts@main/redaction/Redaction-Bold.woff2")
          format("woff2");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
